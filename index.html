<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil TKA — SMP Negeri 47 Batam 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060912;
    --surface: #0d1220;
    --surface2: #131929;
    --border: rgba(99,179,255,0.12);
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --gold: #f59e0b;
    --silver: #94a3b8;
    --bronze: #cd7c3a;
    --text: #e2e8f0;
    --muted: #64748b;
    --baik-istimewa: #a855f7;
    --baik: #22d3ee;
    --memadai: #4ade80;
    --kurang: #f87171;
    --glow: 0 0 40px rgba(59,130,246,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px; }

  /* ── INTRO SPLASH ── */
  #intro-splash {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    overflow: hidden;
  }
  #intro-splash::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .splash-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    color: var(--accent2); text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
    margin-bottom: 20px;
  }
  .splash-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 7vw, 80px);
    font-weight: 800; line-height: 1.05;
    text-align: center;
    background: linear-gradient(135deg, #fff 0%, #93c5fd 50%, #06b6d4 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.4s forwards;
  }
  .splash-sub {
    font-size: 14px; color: var(--muted); margin-top: 16px; text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.7s forwards;
  }
  .splash-stats {
    display: flex; gap: 40px; margin-top: 40px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.9s forwards;
  }
  .splash-stat { text-align: center; }
  .splash-stat-val {
    font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .splash-stat-lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-top: 4px; }
  .splash-cta {
    margin-top: 48px;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.2s forwards;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 100px;
    padding: 14px 36px;
    color: #fff; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: 0.05em;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(59,130,246,0.4);
  }
  .splash-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(59,130,246,0.5); }
  .splash-scroll-hint {
    margin-top: 16px; font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace; letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.5s forwards;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* splash exit */
  #intro-splash.exiting {
    animation: splashExit 0.7s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes splashExit {
    0%  { opacity:1; transform:translateY(0) scale(1); }
    40% { opacity:1; transform:translateY(-20px) scale(1.02); }
    100%{ opacity:0; transform:translateY(-120px) scale(0.96); pointer-events:none; }
  }

  /* main content hidden until splash gone */
  #main-content { opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease; }
  #main-content.visible { opacity: 1; transform: translateY(0); }

  /* ── COMPACT HEADER ── */
  .compact-header {
    padding: 32px 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .compact-header-left { }
  .compact-title {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, #fff, #93c5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .compact-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 3px; }
  .compact-chips { display: flex; gap: 16px; flex-wrap: wrap; }
  .compact-chip {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
    color: var(--muted); display: flex; align-items: center; gap: 6px;
  }
  .compact-chip b { color: var(--accent2); }

  /* ── SEARCH SECTION (top) ── */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: var(--glow);
  }
  .search-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 14px;
  }
  .search-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--muted); pointer-events: none;
  }
  .search-box input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 40px 12px 42px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box input:focus {
    border-color: rgba(59,130,246,0.5);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-clear-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 10px; cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    line-height: 1; padding: 0;
  }
  .search-clear-btn:hover {
    background: rgba(248,113,113,0.2); border-color: rgba(248,113,113,0.4);
    color: var(--kurang);
  }
  .filter-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 14px; border-radius: 100px;
    font-size: 11px; font-family: 'DM Mono', monospace;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all 0.2s; letter-spacing: 0.03em; white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.4); color: var(--accent);
  }
  .filter-btn.f-baik-istimewa.active { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.4); color: var(--baik-istimewa); }
  .filter-btn.f-baik.active { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.4); color: var(--baik); }
  .filter-btn.f-memadai.active { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: var(--memadai); }
  .filter-btn.f-kurang.active { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--kurang); }
  .result-count { font-size: 11px; color: var(--muted); margin-top: 10px; font-family: 'DM Mono', monospace; }
  .result-count b { color: var(--accent2); }
  .search-compare-hint {
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 14px;
    background: rgba(59,130,246,0.07); border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px; font-size: 12px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .compare-quick-btn {
    margin-left: auto; padding: 6px 14px; border-radius: 100px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(59,130,246,0.35);
  }
  .compare-quick-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.45); }
  .compare-quick-btn-sm {
    padding: 4px 12px; border-radius: 100px;
    background: transparent; border: 1px solid rgba(59,130,246,0.4);
    color: var(--accent); font-family: 'DM Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .compare-quick-btn-sm:hover { background: rgba(59,130,246,0.15); }

  /* ── SEARCH RESULT CARD (MODAL) ── */
  #search-result-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 200;
    background: rgba(0,0,0,0.75);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  #search-result-overlay.open { display: block; }
  .modal-center-wrap {
    min-height: 100%;
    width: 100%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
    padding: 20px 16px;
    box-sizing: border-box;
  }
  #search-result-card {
    background: var(--surface);
    border: 1px solid rgba(99,179,255,0.2);
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: modalIn 0.28s cubic-bezier(0.34,1.4,0.64,1);
    flex-shrink: 0;
    position: relative;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }

  .src-modal-header {
    background: var(--surface2);
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border-radius: 20px 20px 0 0;
  }
  .src-modal-header::before { display: none; }
  .src-modal-close {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%; width: 26px; height: 26px; min-width: 26px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  .src-modal-close:hover { background: rgba(248,113,113,0.2); border-color: rgba(248,113,113,0.4); color: var(--kurang); }
  .src-modal-body { padding: 12px 14px 14px; }
  #search-result-card h3 {
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result-nisn { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 0; }
  .result-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .score-block {
    background: var(--surface2); border-radius: 12px; padding: 10px 12px;
    border: 1px solid var(--border); min-width: 0;
  }
  .score-block-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; font-family: 'DM Mono', monospace; }
  .score-block-value {
    font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;
    line-height: 1; white-space: nowrap;
  }
  .score-block-cat { font-size: 10px; margin-top: 3px; }
  .result-avg-row {
    margin-top: 8px;
    background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.07));
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 12px; padding: 9px 12px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .result-avg-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; }
  .result-avg-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; flex-shrink: 0; }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 4px;
    margin-bottom: 20px; width: 100%;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 9px 14px; border-radius: 10px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.04em; cursor: pointer; border: none;
    background: transparent; color: var(--muted);
    transition: all 0.2s; text-transform: uppercase;
    white-space: nowrap; flex-shrink: 0;
  }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
  .tab.tab-lb.active { background: linear-gradient(135deg, var(--gold), #fbbf24); color: #000; box-shadow: 0 4px 12px rgba(245,158,11,0.4); }

  /* ── STATS MINI ROW ── */
  .stats-mini {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-mini-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 14px;
    position: relative; overflow: hidden;
  }
  .stat-mini-card::after {
    content:''; position:absolute; top:0;left:0;right:0;height:2px;
    background: linear-gradient(90deg,var(--accent),var(--accent2)); opacity:.6;
  }
  .stat-mini-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .stat-mini-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #fff; line-height: 1; }
  .stat-mini-sub { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden; margin-bottom: 20px;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 560px; }
  thead { background: var(--surface2); }
  th {
    padding: 12px 14px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
    text-align: left; font-weight: 500;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--accent2); }
  th.sorted { color: var(--accent2); }
  .sort-arrow { margin-left: 4px; opacity: 0.5; }
  td {
    padding: 11px 14px; font-size: 13px;
    border-bottom: 1px solid rgba(99,179,255,0.05);
    vertical-align: middle; white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr { transition: background 0.15s; }
  tr:hover td { background: rgba(59,130,246,0.04); }

  .no-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .name-cell { font-weight: 500; white-space: normal; min-width: 160px; }
  .nisn-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .score-num { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }

  .cat-badge {
    display: inline-block; padding: 2px 8px; border-radius: 100px;
    font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500;
    letter-spacing: 0.03em; vertical-align: middle;
  }
  .cat-Baik-Istimewa { background: rgba(168,85,247,0.15); color: var(--baik-istimewa); border: 1px solid rgba(168,85,247,0.3); }
  .cat-Baik { background: rgba(6,182,212,0.12); color: var(--baik); border: 1px solid rgba(6,182,212,0.25); }
  .cat-Memadai { background: rgba(74,222,128,0.08); color: var(--memadai); border: 1px solid rgba(74,222,128,0.2); }
  .cat-Kurang { background: rgba(248,113,113,0.08); color: var(--kurang); border: 1px solid rgba(248,113,113,0.2); }

  /* ── LEADERBOARD ── */
  #leaderboard-section { display: none; }
  .lb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .lb-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
  .lb-header {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .lb-icon { font-size: 18px; }
  .lb-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
  .lb-sub { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .lb-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid rgba(99,179,255,0.04);
    transition: background 0.15s;
  }
  .lb-item:last-child { border-bottom: none; }
  .lb-item:hover { background: rgba(59,130,246,0.04); }
  .lb-rank {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; flex-shrink: 0;
  }
  .rank-1 { background: linear-gradient(135deg,#f59e0b,#fbbf24); color:#000; box-shadow:0 4px 12px rgba(245,158,11,0.4); }
  .rank-2 { background: linear-gradient(135deg,#94a3b8,#cbd5e1); color:#000; box-shadow:0 4px 12px rgba(148,163,184,0.3); }
  .rank-3 { background: linear-gradient(135deg,#cd7c3a,#f59e0b); color:#000; box-shadow:0 4px 12px rgba(205,124,58,0.3); }
  .rank-n { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .lb-info { flex: 1; min-width: 0; }
  .lb-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-detail { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .lb-score { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; flex-shrink: 0; }
  .lb-score.gold { color: var(--gold); }
  .lb-score.silver { color: var(--silver); }
  .lb-score.bronze { color: var(--bronze); }

  .src-lb-ranks {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 8px;
  }
  .src-lb-rank-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 6px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; gap: 2px;
    transition: border-color 0.2s; overflow: hidden;
  }
  .src-lb-rank-card.rank-top1  { border-color: rgba(245,158,11,0.5);  background: rgba(245,158,11,0.07); }
  .src-lb-rank-card.rank-top3  { border-color: rgba(205,124,58,0.45); back
